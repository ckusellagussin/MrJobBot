from pathlib import Path
p = Path('output/mrjobbot_repo/.github/workflows/run.yml')
text = p.read_text(encoding='utf-8')
text = text.replace('      - name: Setup Python\n        uses: actions/setup-python@v5\n', '      - name: Setup Python\n        uses: actions/setup-python@v6\n')
p.write_text(text, encoding='utf-8')
print('updated workflow')